name: Deploy Environment

on: 
    workflow_call:
        inputs:
            environment:
                required: true
                type: string


jobs:
    env_deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        steps:
            - name: Mostrar variables del entorno seleccionado
              run: |
                echo "El entorno seleccionado para el despliegue ha sido:" ${{ inputs.environment }}